spring.application.name=backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.connection.timezone=UTC

server.port=${SERVER_PORT:8080}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

URL_FRONTEND=${URL_FRONT}

security.jwt.secret=${JWT_SECRET}

logging.file.name=logs/backend.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [req:%X{requestId:-N/A}] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [req:%X{requestId:-N/A}] %logger{36} - %msg%n
logging.logback.rollingpolicy.max-file-size=5MB
logging.logback.rollingpolicy.max-history=5
logging.logback.rollingpolicy.total-size-cap=100MB

logging.level.calidia.backend=WARN
logging.level.org.springframework.security=WARN

security.password-reset.token-minutes=${PASSWORD_RESET_TOKEN_MINUTES:30}
security.password-reset.enabled=${AUTH_PASSWORD_RESET_ENABLED:false}
security.cookie.secure=${SECURITY_COOKIE_SECURE:true}
security.cookie.same-site=${SECURITY_COOKIE_SAME_SITE:None}

app.name=Calidia
app.password-reset.help-message=Si no solicitaste este cambio, ignora este correo y reportalo al administrador.

spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
mail.from=${SMTP_FROM}


